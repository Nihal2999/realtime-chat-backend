apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: realtime-chat-backend-auth-service:latest
          imagePullPolicy: Never
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://postgres:password@auth-db:5432/auth_db
            - name: SECRET_KEY
              value: your_super_secret_key_here
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  type: NodePort
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 30001