name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install auth-service dependencies
        run: |
          cd auth-service
          pip install -r requirements.txt

      - name: Install chat-service dependencies
        run: |
          cd chat-service
          pip install -r requirements.txt

      - name: Install notification-service dependencies
        run: |
          cd notification-service
          pip install -r requirements.txt

  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v4
        with:
          context: ./auth-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

      - name: Build and push chat-service
        uses: docker/build-push-action@v4
        with:
          context: ./chat-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/chat-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v4
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/notification-service:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/realtime-chat-backend
            git pull origin main

            echo "Stopping existing containers..."
            docker-compose down

            echo "Pulling latest images..."
            docker-compose pull

            echo "Starting databases first..."
            docker-compose up -d auth-db mongodb redis
            sleep 20

            echo "Starting Zookeeper..."
            docker-compose up -d zookeeper
            sleep 20

            echo "Starting Kafka..."
            docker-compose up -d kafka
            sleep 40

            echo "Starting application services..."
            docker-compose up -d auth-service chat-service notification-service

            echo "Deployment completed successfully!"